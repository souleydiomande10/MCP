<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hors ligne — Market Center Place</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:#f4f6fb; }
    .offline-card {
      background:white; border-radius:16px; padding:3rem 2.5rem;
      text-align:center; max-width:420px; box-shadow:0 8px 40px rgba(0,0,0,.08);
    }
    .offline-icon { width:72px; height:72px; background:#fef2f2; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 1.5rem; }
    .offline-icon svg { stroke:#c0202a; }
    .offline-title { font-size:1.3rem; font-weight:900; color:#0b1f4b; margin-bottom:.5rem; }
    .offline-desc  { font-size:.85rem; color:#64748b; line-height:1.7; margin-bottom:1.5rem; }
    .btn-retry { display:inline-flex; align-items:center; gap:8px; background:#0b1f4b; color:white; padding:12px 24px; border-radius:8px; border:none; font-family:'Montserrat',sans-serif; font-size:.8rem; font-weight:800; cursor:pointer; }
    .btn-retry svg { stroke:white; }
  </style>
  <link rel="stylesheet" href="components.css"/>
</head>
<body>
  <div class="offline-card">
    <div class="offline-icon">
      <svg width="32" height="32" fill="none" viewBox="0 0 24 24" stroke-width="1.8">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <circle cx="12" cy="20" r="1" fill="#c0202a" stroke="none"/>
      </svg>
    </div>
    <div class="offline-title">Vous êtes hors ligne</div>
    <div class="offline-desc">
      Impossible de charger Market Center Place. Vérifiez votre connexion internet et réessayez.
    </div>
    <button class="btn-retry" onclick="window.location.reload()">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/></svg>
      Réessayer
    </button>
  </div>
</body>
</html>
